<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Transaction Viewer - Toll & Parking Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1e2a3e;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #1e3c4c 0%, #2c5368 100%);
            color: white;
            padding: 28px 25px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .description {
            font-size: 1rem;
            opacity: 0.85;
        }

        .upload-section {
            padding: 28px 25px;
            background: #f8fafc;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .file-input-container {
            position: relative;
            display: inline-block;
            margin: 12px 0;
        }

        .file-input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-block;
            padding: 14px 32px;
            background: #2c6e9e;
            color: white;
            border-radius: 48px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .file-input-label:hover {
            background: #1e4a6e;
            transform: translateY(-1px);
        }

        .file-name {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #4a627a;
        }

        /* FILTER PANEL */
        .filter-panel {
            background: white;
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: flex-end;
            justify-content: space-between;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 160px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5568;
        }

        .filter-group input, .filter-group select {
            padding: 10px 12px;
            border: 1.5px solid #cbd5e0;
            border-radius: 12px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #2c6e9e;
            box-shadow: 0 0 0 3px rgba(44,110,158,0.2);
        }

        .filter-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-filter {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 32px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-filter:hover {
            background: #1e4a6e;
        }

        .btn-reset {
            background: #e2e8f0;
            color: #2d3748;
            border: none;
            padding: 10px 24px;
            border-radius: 32px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-reset:hover {
            background: #cbd5e0;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
        }
        .badge-toll { background: #fee2e2; color: #b91c1c; }
        .badge-parking { background: #e0f2fe; color: #0c4a6e; }

        .search-section {
            padding: 15px 25px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-input {
            flex: 2;
            min-width: 260px;
            padding: 12px 18px;
            border: 1.5px solid #cbd5e0;
            border-radius: 40px;
            font-size: 1rem;
        }

        .search-input:focus {
            border-color: #2c6e9e;
            outline: none;
        }

        .search-btn {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .results-section {
            padding: 25px;
            background: #fefefe;
        }

        .plate-summary {
            margin-bottom: 32px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #edf2f7;
        }

        .plate-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: #f9fbfd;
            border-bottom: 2px solid #e2edf7;
            flex-wrap: wrap;
            gap: 12px;
        }

        .plate-number {
            font-size: 1.4rem;
            font-weight: 800;
            color: #c2410c;
            background: #fff2e6;
            padding: 5px 14px;
            border-radius: 40px;
        }

        .plate-total {
            font-size: 1.2rem;
            font-weight: 700;
            background: #eef2ff;
            padding: 6px 18px;
            border-radius: 32px;
            color: #1f6392;
        }

        .transaction-table {
            width: 100%;
            border-collapse: collapse;
        }

        .transaction-table th {
            background: #f1f5f9;
            padding: 14px 16px;
            text-align: left;
            font-weight: 700;
            color: #1e3a5f;
            font-size: 0.85rem;
        }

        .transaction-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f6;
            vertical-align: middle;
        }

        .transaction-table tr:hover {
            background: #fafcff;
        }

        .transaction-amount {
            font-weight: 700;
            color: #2b6e3c;
        }

        .negative-amount {
            color: #b91c1c;
        }

        .no-results {
            text-align: center;
            padding: 48px 20px;
            color: #5a6e85;
            font-size: 1.1rem;
        }

        .summary-stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 28px;
            background: #eef3fa;
            padding: 20px;
            border-radius: 24px;
        }

        .stat-card {
            flex: 1;
            background: white;
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1f6392;
        }

        .plate-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .plate-chip {
            background: #e2e8f0;
            color: #2c3e66;
            padding: 6px 16px;
            border-radius: 32px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .plate-chip:hover {
            background: #2c6e9e;
            color: white;
        }

        @media (max-width: 780px) {
            .filter-panel { flex-direction: column; align-items: stretch; }
            .transaction-table { display: block; overflow-x: auto; }
        }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1>📊 Transaction Analyzer</h1>
        <p class="description">Upload Excel → Filter by date/time range & transaction type (Parking/Toll) → Group by license plate</p>
    </header>

    <section class="upload-section">
        <div class="file-input-container">
            <label for="fileInput" class="file-input-label">📁 Upload Excel (.xlsx, .xls)</label>
            <input type="file" id="fileInput" class="file-input" accept=".xlsx, .xls">
        </div>
        <div class="file-name" id="fileName">No file selected</div>
    </section>

    <!-- FILTER CONTROLS: DATE RANGE + TYPE -->
    <div class="filter-panel" id="filterPanel" style="display: none;">
        <div class="filter-group">
            <label>📅 Start Date & Time</label>
            <input type="datetime-local" id="startDateTime" step="1">
        </div>
        <div class="filter-group">
            <label>📅 End Date & Time</label>
            <input type="datetime-local" id="endDateTime" step="1">
        </div>
        <div class="filter-group">
            <label>🏷️ Transaction Type</label>
            <select id="txnTypeFilter">
                <option value="all">All (Toll + Parking)</option>
                <option value="toll">🛣️ Toll Only</option>
                <option value="parking">🅿️ Parking Only</option>
            </select>
        </div>
        <div class="filter-actions">
            <button class="btn-filter" id="applyFilterBtn">🔍 Apply Filters</button>
            <button class="btn-reset" id="resetFiltersBtn">⟳ Reset</button>
        </div>
    </div>

    <section class="search-section" id="searchSection" style="display: none;">
        <input type="text" class="search-input" id="plateSearch" placeholder="Search by plate number (e.g., TX - VSN2039)">
        <button class="search-btn" id="searchBtn">Search Plate</button>
    </section>

    <section class="results-section" id="resultsSection">
        <div class="no-results">✨ Upload an Excel file to view transactions with powerful date & type filters</div>
    </section>
</div>

<script>
    // ---------- GLOBAL STATE ----------
    let rawTransactions = [];         // original parsed rows with enriched fields
    let currentFilteredData = [];     // after date+type filtering
    let currentPlateMap = {};         // grouped data based on filtered data

    // Helper: detect transaction type (parking or toll) based on keywords in location/description
    function detectTransactionType(row) {
        const location = (row['Location'] || row['LOCATION'] || row['Toll Location'] || row['Location Name'] || '').toLowerCase();
        const description = (row['Description'] || row['Transaction Description'] || row['Remarks'] || '').toLowerCase();
        const combined = location + " " + description;
        
        if (combined.includes('parking') || combined.includes('park') || combined.includes('garage') || combined.includes('lot')) {
            return 'parking';
        }
        if (combined.includes('toll') || combined.includes('turnpike') || combined.includes('express') || combined.includes('highway')) {
            return 'toll';
        }
        // fallback: if amount positive/negative? but we keep neutral -> classify based on default context (maybe 'toll' if not sure, but safer as 'toll')
        return 'toll';   // default most transactions are tolls, but user can filter
    }

    // parse datetime from various column formats
    function parseTransactionDateTime(row) {
        let rawDate = row['Transaction Entry Date/Time'] || row['Entry Date/Time'] || row['Date'] || row['TIME'] || row['Transaction Date'] || null;
        if (!rawDate) return null;
        // try to parse using dayjs (flexible)
        let parsed = dayjs(rawDate);
        if (parsed.isValid()) return parsed;
        // fallback: try new Date
        let jsDate = new Date(rawDate);
        if (!isNaN(jsDate.getTime())) return dayjs(jsDate);
        return null;
    }

    // apply date range + type filter to rawTransactions
    function applyFilters(startDateMoment, endDateMoment, typeFilter) {
        if (!rawTransactions.length) return [];

        let filtered = rawTransactions.filter(txn => {
            // Date filter
            if (startDateMoment && txn.parsedDate) {
                if (txn.parsedDate.isBefore(startDateMoment)) return false;
            }
            if (endDateMoment && txn.parsedDate) {
                if (txn.parsedDate.isAfter(endDateMoment)) return false;
            }
            // Type filter
            if (typeFilter !== 'all') {
                if (txn.transactionType !== typeFilter) return false;
            }
            return true;
        });
        return filtered;
    }

    // rebuild grouped data from filtered array and render
    function renderGroupedTransactions(filteredList, searchPlateTerm = '') {
        if (!filteredList.length) {
            document.getElementById('resultsSection').innerHTML = `<div class="no-results">🚫 No transactions match the selected filters / date range. Try adjusting filters or upload another file.</div>`;
            return;
        }

        // Group by plate
        let plateGroup = {};
        filteredList.forEach(txn => {
            let plate = txn.plate || 'Unknown Plate';
            if (!plateGroup[plate]) {
                plateGroup[plate] = { transactions: [], total: 0 };
            }
            plateGroup[plate].transactions.push(txn);
            plateGroup[plate].total += Math.abs(txn.amount);
        });

        // Filter by search term if present
        let matchingPlates = Object.keys(plateGroup);
        if (searchPlateTerm.trim() !== '') {
            matchingPlates = matchingPlates.filter(plate => plate.toLowerCase().includes(searchPlateTerm.toLowerCase()));
        }

        if (matchingPlates.length === 0) {
            document.getElementById('resultsSection').innerHTML = `<div class="no-results">🔍 No plates found matching "${searchPlateTerm}" with current filters.</div>`;
            return;
        }

        // Compute overall stats
        let totalAmountAll = 0, totalTxnsAll = 0, totalTollAmt = 0, totalParkAmt = 0;
        matchingPlates.forEach(plate => {
            const group = plateGroup[plate];
            group.transactions.forEach(t => {
                totalAmountAll += Math.abs(t.amount);
                totalTxnsAll++;
                if (t.transactionType === 'toll') totalTollAmt += Math.abs(t.amount);
                else totalParkAmt += Math.abs(t.amount);
            });
        });

        let html = `
            <div class="summary-stats-grid">
                <div class="stat-card"><div class="stat-value">${matchingPlates.length}</div><div>Plates Found</div></div>
                <div class="stat-card"><div class="stat-value">${totalTxnsAll}</div><div>Transactions</div></div>
                <div class="stat-card"><div class="stat-value">$${totalAmountAll.toFixed(2)}</div><div>Total Amount</div></div>
                <div class="stat-card"><div class="stat-value" style="color:#b91c1c;">$${totalTollAmt.toFixed(2)}</div><div>Tolls</div></div>
                <div class="stat-card"><div class="stat-value" style="color:#0c4a6e;">$${totalParkAmt.toFixed(2)}</div><div>Parking</div></div>
            </div>
            <div class="plate-summary">
                <div class="plate-header">
                    <div class="plate-number">📋 All License Plates (click to search)</div>
                    <div class="plate-total">Quick navigation</div>
                </div>
                <div class="plate-list" id="plateChipsContainer">
                    ${matchingPlates.map(plate => `<div class="plate-chip" data-plate="${plate.replace(/"/g, '&quot;')}">${escapeHtml(plate)}</div>`).join('')}
                </div>
            </div>
        `;

        // Render each plate with transactions
        for (let plate of matchingPlates) {
            const group = plateGroup[plate];
            const sortedTx = group.transactions.sort((a,b) => (b.parsedDate?.valueOf() || 0) - (a.parsedDate?.valueOf() || 0));
            html += `
                <div class="plate-summary" id="plate-${plate.replace(/\s/g, '_')}">
                    <div class="plate-header">
                        <div class="plate-number">${escapeHtml(plate)}</div>
                        <div class="plate-total">💰 Total: $${group.total.toFixed(2)}</div>
                    </div>
                    <table class="transaction-table">
                        <thead>
                            <tr><th>Plate No</th><th>Entry DateTime</th><th>Exit DateTime</th><th>Transaction ID</th><th>Location</th><th>Type</th><th>Amount</th></tr>
                        </thead>
                        <tbody>
            `;
            sortedTx.forEach(t => {
                const plateNom = t.plate;
                const entryDisplay = t.entryDateTimeRaw || '—';
                const exitDisplay = t.exitDateTimeRaw || '—';
                const typeLabel = t.transactionType === 'toll' ? '<span class="type-badge badge-toll">🛣️ Toll</span>' : '<span class="type-badge badge-parking">🅿️ Parking</span>';
                const amountClass = t.amount < 0 ? 'negative-amount' : 'transaction-amount';
                html += `
                    <tr>
                        <td>${plateNom}</td>
                        <td>${escapeHtml(entryDisplay)}</td>
                        <td>${escapeHtml(exitDisplay)}</td>
                        <td class="transaction-id">${escapeHtml(t.id)}</td>
                        <td class="location">${escapeHtml(t.location)}</td>
                        <td>${typeLabel}</td>
                        <td class="${amountClass}">$${Math.abs(t.amount).toFixed(2)}</td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>`;
        }

        document.getElementById('resultsSection').innerHTML = html;

        // attach chip click events
        document.querySelectorAll('.plate-chip').forEach(chip => {
            chip.addEventListener('click', function(e) {
                const plateVal = this.getAttribute('data-plate');
                const searchBox = document.getElementById('plateSearch');
                if (searchBox) searchBox.value = plateVal;
                refreshWithCurrentFiltersAndSearch(plateVal);
            });
        });
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // main function that applies date, type, and search then re-render
    function refreshWithCurrentFiltersAndSearch(overrideSearch = null) {
        let startDateInput = document.getElementById('startDateTime').value;
        let endDateInput = document.getElementById('endDateTime').value;
        let typeVal = document.getElementById('txnTypeFilter').value;

        let startMoment = startDateInput ? dayjs(startDateInput) : null;
        let endMoment = endDateInput ? dayjs(endDateInput) : null;

        let filtered = applyFilters(startMoment, endMoment, typeVal);
        currentFilteredData = filtered;
        
        let searchTerm = (overrideSearch !== null) ? overrideSearch : document.getElementById('plateSearch').value.trim();
        renderGroupedTransactions(filtered, searchTerm);
    }

    // process excel: parse rows, enrich with type and parsed date
    function processExcelAndStore(dataRows) {
        if (!dataRows.length) {
            alert("Excel file appears empty.");
            return;
        }
        rawTransactions = [];
        for (let row of dataRows) {
            // extract fields
            let plate = row['Plate'] || row['plate'] || row['PLATE'] || row['Plate Number'] || row['License Plate'] || row['Plate No'] || 'Unknown';
            let amountRaw = row['Transaction Amount'] ?? row['Amount'] ?? row['AMOUNT'] ?? row['Toll Amount'] ?? row['TransactionAmount'] ?? 0;
            let amount = parseFloat(amountRaw);
            if (isNaN(amount)) amount = 0;
            let id = row['Transaction ID'] || row['ID'] || row['TransactionID'] || row['Txn ID'] || 'N/A';
            let location = row['Location'] || row['LOCATION'] || row['Toll Location'] || row['Location Name'] || 'Unknown Location';
            let entryDateTimeRaw = row['Transaction Entry Date/Time'] || row['Entry Date/Time'] || row['Date'] || row['TIME'] || '';
            let exitDateTimeRaw = row['Transaction Exit Date/Time'] || row['Exit Date/Time'] || '';
            
            let parsedDate = parseTransactionDateTime(row);
            let transactionType = detectTransactionType(row);
            
            rawTransactions.push({
                plate: String(plate).trim(),
                amount: amount,
                id: String(id),
                location: String(location),
                entryDateTimeRaw: entryDateTimeRaw,
                exitDateTimeRaw: exitDateTimeRaw,
                parsedDate: parsedDate,
                transactionType: transactionType,
                rawRow: row
            });
        }
        
        // show filter panel & search
        document.getElementById('filterPanel').style.display = 'flex';
        document.getElementById('searchSection').style.display = 'flex';
        
        // set default datetime-local range (optional: last 30 days? no, keep empty initially)
        // reset date inputs to empty for full view
        document.getElementById('startDateTime').value = '';
        document.getElementById('endDateTime').value = '';
        document.getElementById('txnTypeFilter').value = 'all';
        document.getElementById('plateSearch').value = '';
        
        // apply empty filters -> show all data
        let allFiltered = applyFilters(null, null, 'all');
        currentFilteredData = allFiltered;
        renderGroupedTransactions(allFiltered, '');
    }

    // handle file reading
    function handleExcelFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(firstSheet);
                if (json.length === 0) {
                    document.getElementById('resultsSection').innerHTML = '<div class="no-results">⚠️ Excel sheet has no data rows.</div>';
                    return;
                }
                processExcelAndStore(json);
            } catch (err) {
                document.getElementById('resultsSection').innerHTML = `<div class="no-results">❌ Error parsing file: ${err.message}</div>`;
            }
        };
        reader.onerror = () => { alert("File read error"); };
        reader.readAsArrayBuffer(file);
    }

    // ---- EVENT LISTENERS ----
    document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.getElementById('fileInput');
        const fileNameSpan = document.getElementById('fileName');
        
        fileInput.addEventListener('change', function(e) {
            if (this.files.length > 0) {
                fileNameSpan.textContent = this.files[0].name;
                handleExcelFile(this.files[0]);
            } else {
                fileNameSpan.textContent = 'No file chosen';
            }
        });
        
        // Filter buttons
        document.getElementById('applyFilterBtn').addEventListener('click', () => {
            refreshWithCurrentFiltersAndSearch();
        });
        document.getElementById('resetFiltersBtn').addEventListener('click', () => {
            document.getElementById('startDateTime').value = '';
            document.getElementById('endDateTime').value = '';
            document.getElementById('txnTypeFilter').value = 'all';
            document.getElementById('plateSearch').value = '';
            if (rawTransactions.length) {
                let fullFiltered = applyFilters(null, null, 'all');
                currentFilteredData = fullFiltered;
                renderGroupedTransactions(fullFiltered, '');
            } else {
                document.getElementById('resultsSection').innerHTML = '<div class="no-results">Reset filters. Upload file first.</div>';
            }
        });
        
        document.getElementById('searchBtn').addEventListener('click', () => {
            refreshWithCurrentFiltersAndSearch();
        });
        const searchInput = document.getElementById('plateSearch');
        if(searchInput) {
            searchInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') refreshWithCurrentFiltersAndSearch(); });
        }
        
        // Drag & drop
        const uploadDiv = document.querySelector('.upload-section');
        uploadDiv.addEventListener('dragover', (e) => { e.preventDefault(); uploadDiv.style.background = '#eef2f8'; });
        uploadDiv.addEventListener('dragleave', () => { uploadDiv.style.background = '#f8fafc'; });
        uploadDiv.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadDiv.style.background = '#f8fafc';
            if(e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                fileNameSpan.textContent = e.dataTransfer.files[0].name;
                handleExcelFile(e.dataTransfer.files[0]);
            }
        });
    });
</script>
</body>
</html>
